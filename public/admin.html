<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="site-header"><a class="brand" href="admin.html"><img class="logo-img" data-logo-url src="" alt="Logo"><span>Dailydough Admin</span></a><nav><a href="index.html">Storefront</a><a href="admin-login.html">Login</a></nav></header><main><section class="page-title"><span class="eyebrow">Dashboard</span><h1>Business management</h1></section><section id="stats" class="stats"></section><section class="admin-grid"><article class="panel"><h2>Product management</h2><form id="productForm" class="form"><input type="hidden" name="product_id"><label>Name<input name="name" required></label><label>Category<input name="category" required></label><label>Price<input type="number" name="price" min="0" step="0.01" required></label><label>Description<textarea name="description" required></textarea></label><label>Ingredients<textarea name="ingredients" required></textarea></label><label>Image<input type="file" name="image" accept="image/*"></label><label class="radio"><input type="checkbox" name="featured"> Featured product</label><button class="btn">Save product</button></form><div class="table-wrap"><table><tbody id="productRows"></tbody></table></div></article><article class="panel"><h2>Order management</h2><div class="toolbar"><input id="orderSearch" placeholder="Search orders"><select id="orderStatus"><option value="">All statuses</option><option>Pending Confirmation</option><option>Confirmed</option><option>Preparing</option><option>Out for Delivery</option><option>Completed</option><option>Cancelled</option></select></div><div class="table-wrap"><table><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th><th>Proof</th><th>Actions</th></tr></thead><tbody id="orderRows"></tbody></table></div></article></section><section class="panel"><h2>Business settings</h2><form id="settingsForm" class="form settings-grid"><label>Business name<input name="business_name"></label><label>Primary color<input type="color" name="primary_color"></label><label>Accent color<input type="color" name="accent_color"></label><label>Contact number<input name="contact_number"></label><label>Email<input name="email"></label><label>Address<textarea name="address"></textarea></label><label>GCash number<input name="gcash_number"></label><label>Business hours<input name="business_hours"></label><label>Preparation time<textarea name="preparation_time"></textarea></label><label>Cancellation policy<textarea name="cancellation_policy"></textarea></label><label>Return policy<textarea name="return_policy"></textarea></label><label>Facebook<input name="facebook_url"></label><label>Instagram<input name="instagram_url"></label><label>TikTok<input name="tiktok_url"></label><label>Logo<input type="file" name="logo" accept="image/*"></label><label>GCash QR<input type="file" name="gcash_qr" accept="image/*"></label><button class="btn">Save settings</button><p id="settingsSaved"></p></form></section></main><script type="module" src="js/pages/admin.js"></script></body></html>
